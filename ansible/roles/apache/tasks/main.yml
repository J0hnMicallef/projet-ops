---
- name: Créer dossier tmp Ansible
  raw: mkdir -p /tmp/.ansible/tmp

- name: Mettre à jour APT
  raw: apt-get update -qq

- name: Installer les extensions PHP PostgreSQL et curl
  raw: |
    apt-get install -y libpq-dev curl
    docker-php-ext-install pdo pdo_pgsql

- name: Redémarrer Apache pour charger les extensions PHP
  raw: apache2ctl restart || true

- name: Déployer la page d'accueil (redirige vers app.php)
  copy:
    dest: /var/www/html/index.html
    content: |
      <!DOCTYPE html>
      <html lang="fr">
      <head>
        <meta charset="UTF-8">
        <meta http-equiv="refresh" content="0;url=/app.php">
      </head>
      <body>Redirection...</body>
      </html>

- name: Déployer l'application PHP
  template:
    src: app.php.j2
    dest: /var/www/html/app.php

- name: Vérifier qu'Apache répond
  raw: curl -s -o /dev/null -w "%{http_code}" http://localhost/app.php
  register: http_status
  changed_when: false

- name: Statut du déploiement
  debug:
    msg: "{{ inventory_hostname }} → HTTP {{ http_status.stdout }}"