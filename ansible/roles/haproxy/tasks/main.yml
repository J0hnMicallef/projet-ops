---
- name: Créer dossier tmp Ansible
  raw: mkdir -p /tmp/.ansible/tmp

- name: Déployer la configuration HAProxy
  raw: |
    cat > /usr/local/etc/haproxy/haproxy.cfg << 'HAPROXYCFG'
    global
        daemon
        maxconn 256

    defaults
        mode    http
        timeout connect 5s
        timeout client  30s
        timeout server  30s
        option  httplog
        option  dontlognull

    frontend http_front
        bind *:80
        default_backend web_servers

    backend web_servers
        balance roundrobin
        option  httpchk GET /app.php
        server  web1 172.30.0.10:80 check
        server  web2 172.30.0.11:80 check

    listen stats
        bind *:8404
        stats enable
        stats uri /stats
        stats refresh 10s
    HAPROXYCFG

- name: Recharger HAProxy
  raw: |
    kill -HUP $(cat /var/run/haproxy.pid 2>/dev/null) 2>/dev/null \
    || haproxy -f /usr/local/etc/haproxy/haproxy.cfg -D -p /var/run/haproxy.pid \
    || true

- name: Vérifier que HAProxy répond
  raw: wget -qO- http://localhost/app.php | grep -o "projet-ops" | head -1
  register: haproxy_check
  changed_when: false
  retries: 3
  delay: 2

- name: Statut HAProxy
  debug:
    msg: "HAProxy opérationnel — load balancing web1 + web2"