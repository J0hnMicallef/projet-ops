name: ops-pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}
          terraform_wrapper: false

      # ── TERRAFORM ────────────────────────────────
      - name: terraform init
        working-directory: terraform
        run: terraform init

      - name: terraform validate
        working-directory: terraform
        run: terraform validate

      - name: terraform plan
        working-directory: terraform
        run: terraform plan -var-file="variables.tfvars"

      - name: terraform apply
        working-directory: terraform
        run: terraform apply -var-file="variables.tfvars" -auto-approve

      - name: Vérifier que le conteneur tourne
        run: docker ps

      # ── ANSIBLE ──────────────────────────────────
      - name: Installer Ansible
        run: pip install ansible

      - name: Installer Python3 dans le conteneur
        run: |
          docker exec projet-ops-server apt-get update -qq
          docker exec projet-ops-server apt-get install -y python3

      - name: Ansible ping
        working-directory: ansible
        run: ansible all -i inventory.yml -m ping

      - name: Ansible playbook
        working-directory: ansible
        run: ansible-playbook -i inventory.yml playbooks/site.yml -v

      # ── VÉRIFICATION ─────────────────────────────
      - name: Vérifier le site HTTP
        run: |
          sleep 2
          curl -sf http://localhost:8080
          echo "Site accessible"

      - name: Vérifier la page PHP
        run: |
          curl -sf http://localhost:8080/app.php
          echo "PHP fonctionne"