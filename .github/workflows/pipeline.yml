name: ops-pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    env:
      TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
      DB_PASSWORD:        ${{ secrets.DB_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}
          terraform_wrapper: false

      # ── ÉCRIRE LA CONFIG HAPROXY AVANT TERRAFORM ───────────────────
      - name: Créer haproxy.cfg sur le runner
        run: |
          cat > /tmp/haproxy.cfg << 'EOF'
          global
              daemon
              maxconn 256

          defaults
              mode    http
              timeout connect 5s
              timeout client  30s
              timeout server  30s

          frontend http_front
              bind *:80
              default_backend web_servers

          backend web_servers
              balance roundrobin
              option  httpchk GET /app.php
              server  web1 172.30.0.10:80 check
              server  web2 172.30.0.11:80 check

          listen stats
              bind *:8404
              stats enable
              stats uri /stats
              stats refresh 10s
          EOF
          echo "=== Config HAProxy ==="
          cat /tmp/haproxy.cfg

      # ── TERRAFORM ──────────────────────────────────────────────────
      - name: terraform init
        working-directory: terraform
        run: terraform init

      - name: terraform validate
        working-directory: terraform
        run: terraform validate

      - name: terraform plan
        working-directory: terraform
        run: terraform plan -var-file="variables.tfvars"

      - name: terraform apply
        working-directory: terraform
        run: terraform apply -var-file="variables.tfvars" -auto-approve

      - name: Vérifier les conteneurs créés
        run: |
          echo "=== Conteneurs ==="
          docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
          echo ""
          echo "=== Réseaux ==="
          docker network ls | grep projet-ops

      # ── ANSIBLE ────────────────────────────────────────────────────
      - name: Installer Ansible
        run: pip install ansible

      - name: Attendre que les conteneurs soient stables
        run: |
          sleep 10
          docker ps --format "table {{.Names}}\t{{.Status}}"

      - name: Installer Python3 dans les conteneurs
        run: |
          for c in projet-ops-bastion projet-ops-web1 projet-ops-web2; do
            echo "→ Python3 (apt) dans $c"
            docker exec $c apt-get update -qq
            docker exec $c apt-get install -y python3
          done
          echo "→ Python3 (apk) dans projet-ops-haproxy"
          docker exec projet-ops-haproxy apk add --no-cache python3

      - name: Ansible ping
        working-directory: ansible
        run: ansible all -i inventory.yml -m ping

      - name: Ansible — déploiement complet
        working-directory: ansible
        run: ansible-playbook -i inventory.yml playbooks/site.yml -v

      # ── VÉRIFICATION ───────────────────────────────────────────────
      - name: Afficher la page via HAProxy (requête 1)
        run: |
          echo "=== Requête 1 ==="
          curl -sf http://localhost:80/app.php
          echo ""

      - name: Afficher la page via HAProxy (requête 2)
        run: |
          echo "=== Requête 2 ==="
          curl -sf http://localhost:80/app.php
          echo ""

      - name: Vérifier les visites dans PostgreSQL
        run: |
          echo "=== Table visits ==="
          docker exec projet-ops-postgres \
            psql -U appuser -d appdb \
            -c "SELECT server_id, COUNT(*) as total FROM visits GROUP BY server_id;"