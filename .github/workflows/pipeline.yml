name: ops-pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ────────────────────────────────────────
  # JOB 1 — Terraform
  # ────────────────────────────────────────
  terraform:
    name: Terraform
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}
          terraform_wrapper: false

      - name: terraform init
        working-directory: terraform
        run: terraform init

      - name: terraform validate
        working-directory: terraform
        run: terraform validate

      - name: terraform plan
        working-directory: terraform
        run: terraform plan -var-file="variables.tfvars"

      - name: terraform apply
        if: github.ref == 'refs/heads/main'
        working-directory: terraform
        run: terraform apply -var-file="variables.tfvars" -auto-approve

      - name: Afficher les outputs
        if: github.ref == 'refs/heads/main'
        working-directory: terraform
        run: terraform output

  # ────────────────────────────────────────
  # JOB 2 — Ansible
  # ────────────────────────────────────────
  ansible:
    name: Ansible
    runs-on: ubuntu-latest
    needs: terraform
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Installer Ansible
        run: |
          pip install ansible

      - name: Tester la connexion (ping)
        working-directory: ansible
        run: |
          ansible all -i inventory.yml -m ping

      - name: Lancer le playbook
        working-directory: ansible
        run: |
          ansible-playbook -i inventory.yml playbooks/site.yml -v

      - name: Vérifier le site
        run: |
          sleep 2
          curl -sf http://localhost:8080 | grep -o "<title>.*</title>"
          echo "Site accessible sur http://localhost:8080"
          curl -sf http://localhost:8080/app.php | grep -o "PHP.*"
          echo "PHP fonctionne"